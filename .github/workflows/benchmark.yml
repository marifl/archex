name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC

permissions:
  contents: write

jobs:
  benchmark-bm25:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run benchmarks (bm25, all tasks)
        run: |
          uv run archex benchmark run \
            --tasks-dir benchmarks/tasks \
            --output benchmarks/results/bm25 \
            --strategy archex_query

      - name: Quality gate (bm25)
        run: |
          uv run archex benchmark gate \
            --input benchmarks/results/bm25 \
            --min-recall 0.60 \
            --min-f1 0.30 \
            --min-mrr 0.55

      - name: Upload bm25 results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-bm25
          path: benchmarks/results/bm25/

  benchmark-fusion:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run benchmarks (fusion, all tasks)
        run: |
          uv run archex benchmark run \
            --tasks-dir benchmarks/tasks \
            --output benchmarks/results/fusion \
            --strategy archex_query_fusion

      - name: Quality gate (fusion)
        run: |
          uv run archex benchmark gate \
            --input benchmarks/results/fusion \
            --min-recall 0.60 \
            --min-f1 0.30 \
            --min-mrr 0.55

      - name: Upload fusion results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-fusion
          path: benchmarks/results/fusion/

  commit-results:
    runs-on: ubuntu-latest
    needs: [benchmark-bm25, benchmark-fusion]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Download bm25 results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-bm25
          path: benchmarks/results/bm25/

      - name: Download fusion results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-fusion
          path: benchmarks/results/fusion/

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          git add benchmarks/results/
          git diff --cached --quiet || git commit -m "benchmark: update results ${TIMESTAMP}"
          git push
